<div class="modal fade preline-modal" id="dynamicModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
        <div class="modal-content border-0">
            <div class="modal-body p-4 text-center">
                <div id="modalIconContainer" class="modal-icon-circle">
                    <i id="modalIcon" class="bi bi-check-lg"></i>
                </div>
                <h5 id="modalTitle" class="fw-bold mb-2">Confirm</h5>
                <p id="modalMessage" class="small opacity-75 mb-4">Are you sure you want to proceed?</p>
                
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light w-100 rounded-pill border-0 fw-medium" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="modalConfirmBtn" class="btn btn-success w-100 rounded-pill border-0 fw-medium bg-teal">Confirm</button>
                </div>
            </div>
        </div>
    </div>
</div>
