<div class="modal fade preline-modal" id="dynamicModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center">
            <div class="modal-body p-5">
                <div id="modalIcon" class="modal-icon-circle">
                    <i id="modalIconClass" class="bi bi-info-circle"></i>
                </div>
                <h4 id="modalTitle" class="fw-bold mb-2">Confirm Action</h4>
                <p id="modalMessage" class="text-secondary mb-4 small">Are you sure you want to proceed?</p>
                
                <div class="d-flex gap-2 justify-content-center">
                    <button type="button" class="btn btn-sm px-4 btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="modalConfirmBtn" class="btn btn-sm px-4 btn-success rounded-pill bg-teal border-0">Confirm</button>
                </div>
            </div>
        </div>
    </div>
</div>
