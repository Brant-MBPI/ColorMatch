<!-- Upload Modal Component -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header text-white" style="background: var(--sidebar-header-bg);">
                <h6 class="modal-title extra-small fw-bold text-uppercase">
                    <i class="bi bi-paperclip me-2"></i>File Attachment
                </h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-3">
                <!-- Dropzone Container -->
                <div id="dropzone-upload" class="dropzone custom-dropzone-box">
                    <div class="dz-message">
                        <i class="bi bi-cloud-arrow-up fs-1 text-teal"></i>
                        <p class="fw-bold extra-small mt-2 mb-1">Drag & Drop files here</p>
                        <p class="text-muted extra-small">or click to browse</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer p-2 bg-light-subtle">
                <button type="button" class="btn btn-sm btn-secondary extra-small px-3" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="btn-upload-submit" class="btn btn-sm btn-teal extra-small px-3 shadow-sm">
                    <i class="bi bi-check2-circle me-1"></i>Upload All
                </button>
            </div>
        </div>
    </div>
</div>
