{% extends "base.html" %}
{% load static %}

{% block navigation %} 
Formula DC
{% endblock navigation %}

{% block content %}
<div class="container-fluid p-0">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0 main-title">DRY COLOR MATCHING FORM</h4>
    </div>

    <form id="formulaDcForm">
        <div class="row g-4">
            <!-- LEFT COLUMN: Input Sections -->
            <div class="col-lg-3 col-md-4">
                
                <!-- Formulation Details -->
                <div class="card dc-card shadow-sm mb-3">
                    <div class="card-body p-3">
                        <h6 class="dc-section-title mb-3">Formulation Details</h6>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Product Code:</label></div>
                            <div class="col-7"><input type="text" name="product_code" id="id_dc_product_code" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">CMF Number:</label></div>
                            <div class="col-7"><input type="text" name="cmf_number" id="id_dc_cmf_number" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Customer:</label></div>
                            <div class="col-7"><input type="text" name="customer" id="id_dc_customer" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Resin:</label></div>
                            <div class="col-7"><input type="text" name="resin" id="id_dc_resin" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Color:</label></div>
                            <div class="col-7"><input type="text" name="color" id="id_dc_color" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Date Matched:</label></div>
                            <div class="col-7"><input type="date" name="date_matched" id="id_dc_date_matched" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Dosage:</label></div>
                            <div class="col-7"><input type="text" name="dosage" id="id_dc_dosage" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Sample Size:</label></div>
                            <div class="col-7"><input type="text" name="sample_size" id="id_dc_sample_size" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold text-nowrap">Product Used:</label></div>
                            <div class="col-7"><input type="text" name="product_used" id="id_dc_product_used" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold text-nowrap">Mixing Time:</label></div>
                            <div class="col-7"><input type="text" name="mixing_time" id="id_dc_mixing_time" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Application:</label></div>
                            <div class="col-7"><input type="text" name="application" id="id_dc_application" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center">
                            <div class="col-5"><label class="extra-small fw-bold text-nowrap">Finished Product:</label></div>
                            <div class="col-7"><input type="text" name="finished_product" id="id_dc_finished_product" class="form-control form-control-sm uniform-input"></div>
                        </div>
                    </div>
                </div>

                <!-- Personnel -->
                <div class="card dc-card shadow-sm">
                    <div class="card-body p-3">
                        <h6 class="dc-section-title mb-3">Personnel</h6>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Matched by:</label></div>
                            <div class="col-7"><input type="text" name="matched_by" id="id_dc_matched_by" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center mb-2">
                            <div class="col-5"><label class="extra-small fw-bold">Weighed by:</label></div>
                            <div class="col-7"><input type="text" name="weighed_by" id="id_dc_weighed_by" class="form-control form-control-sm uniform-input"></div>
                        </div>
                        <div class="row g-2 align-items-center">
                            <div class="col-5"><label class="extra-small fw-bold">Encoded by:</label></div>
                            <div class="col-7"><input type="text" name="encoded_by" id="id_dc_encoded_by" class="form-control form-control-sm uniform-input"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Formula Composition Table -->
            <div class="col-lg-9 col-md-8">
                <div class="card border-0 shadow-sm dc-table-card rounded-3 h-100">
                    <div class="p-3 d-flex align-items-center dark-card-header">
                        <h6 class="fw-bold text-uppercase extra-small m-0">Formula Composition</h6>
                    </div>
                    
                    <div class="dc-scroll-body">
                        <table class="table align-middle mb-0 dc-records-table">
                            <thead>
                                <tr class="small text-uppercase">
                                    <th class="ps-4" width="50%">Material</th>
                                    <th class="text-center" width="25%">Final %</th>
                                    <th class="pe-4 text-end" width="25%">Total Weight</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for i in "1234567890" %}
                                <tr>
                                    <td class="ps-4"><input type="text" name="material_{{forloop.counter}}" class="table-input" placeholder="Enter material..."></td>
                                    <td><input type="number" step="0.0001" name="percentage_{{forloop.counter}}" class="table-input text-center" placeholder="0.0000"></td>
                                    <td class="pe-4"><input type="number" step="0.0001" name="weight_{{forloop.counter}}" class="table-input text-end" placeholder="0.0000"></td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>

                    <!-- Footer Total Area -->
                    <div class="mt-auto p-4 d-flex justify-content-end align-items-center gap-3 dc-total-footer">
                        <span class="fw-bold small text-uppercase">Total Weight:</span>
                        <input type="text" id="dc_total_weight" class="form-control total-weight-input" value="0.00" readonly>
                    </div>
                </div>
            </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="d-flex justify-content-end gap-2 mt-4 mb-5">
            <button type="button" class="btn btn-sm btn-dark-teal px-4 text-white shadow-sm">
                <i class="bi bi-printer me-1"></i> Print
            </button>
            <button type="reset" class="btn btn-sm btn-primary px-4 shadow-sm">
                <i class="bi bi-file-earmark-plus me-1"></i> New
            </button>
            <button type="submit" class="btn btn-sm btn-success px-4 shadow-sm">
                <i class="bi bi-save me-1"></i> Save
            </button>
        </div>
    </form>
</div>
{% endblock %}
