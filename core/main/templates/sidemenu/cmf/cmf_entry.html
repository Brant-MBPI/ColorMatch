{% extends "base.html" %}
{% load static %}

{% block navigation %} 
CMF Entry
{% endblock navigation %}

{% block content %}
<div class="container-fluid p-0">
    <form class="cmf-entry-form">
        <div class="row g-2">
            
            <!-- LEFT COLUMN -->
            <div class="col-lg-7">
                <!-- General Information -->
                <div class="card cmf-entry-card mb-2 shadow-sm">
                    <div class="card-body p-3">
                        <h6 class="cmf-section-title mb-3">General Information</h6>
                        
                        <div class="row g-2 mb-2">
                            <div class="col-md-12">
                                <label class="fw-bold extra-small required-label">Color Matching No:</label>
                                <input type="text" name="cmf_no" class="form-control form-control-sm uniform-input" >
                            </div>
                            <div class="col-md-12">
                                <label class="fw-bold extra-small required-label">Customer:</label>
                                <select class="form-select form-select-sm ts-select" name="customer" placeholder="Select customer..." >
                                    <option value=""></option>
                                    {% for customer in customers %}
                                        <option value="{{ customer }}">{{ customer }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        
                        <!-- Dates -->
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label class="fw-bold extra-small required-label">Date Created:</label>
                                <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                    <input type="text" name="date_created" class="form-control uniform-input date-picker-single" placeholder="MM/DD/YYYY" data-input >
                                    <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="fw-bold extra-small required-label">Required Date:</label>
                                <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                    <input type="text" name="required_date" class="form-control uniform-input date-picker-asap" placeholder="MM/DD/YYYY or ASAP" data-input >
                                    <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label class="fw-bold extra-small required-label">Date Received:</label>
                                <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                    <input type="text" name="date_received" class="form-control uniform-input date-picker-multiple" placeholder="MM/DD/YYYY, MM/DD/YYYY" data-input >
                                    <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="fw-bold extra-small required-label">Due Date:</label>
                                <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                    <input type="text" name="due_date" class="form-control uniform-input date-picker-single" placeholder="MM/DD/YYYY" data-input >
                                    <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold extra-small d-block mb-1 required-label">Matching Type:</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input visible-check" type="radio" name="matchType" value="new" id="new">
                                <label class="form-check-label extra-small" for="new">New Matching</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input visible-check" type="radio" name="matchType" value="rematch" id="re" >
                                <label class="form-check-label extra-small" for="re">Re-Match</label>
                            </div>
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-md-12">
                                <label class="fw-bold extra-small required-label">Sales Person:</label>
                                <select class="form-select form-select-sm ts-select" name="salesman" placeholder="Select sales person..." >
                                    <option value=""></option>
                                    {% for salesman in salesman %}
                                        <option value="{{ salesman }}">{{ salesman }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="fw-bold extra-small required-label">Finished Product:</label>
                                <input type="text" name="finished_product" class="form-control form-control-sm uniform-input" >
                            </div>
                        </div>

                        <div class="row g-2">
                            <div class="col-4">
                                <label class="fw-bold extra-small required-label">Primary Color:</label>
                                <select class="form-select form-select-sm ts-select" name="primary_color" placeholder="Select color" >
                                    <option value=""></option>
                                    {% for c in primary_color %}
                                        <option value="{{ c.in_code_no }}">{{ c.color }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-8">
                                <label class="fw-bold extra-small required-label">Description:</label>
                                <input type="text" name="color_description" class="form-control form-control-sm uniform-input" placeholder="Enter color description..." >
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Color Requirement -->
                <div class="card cmf-entry-card mb-2 shadow-sm">
                    <div class="card-body p-3">
                        <h6 class="cmf-section-title mb-3 required-label">Color Requirement</h6>
                        <div class="d-flex flex-wrap gap-3 align-items-center">
                            <div class="form-check"><input class="form-check-input visible-check" type="radio" name="colorReq" value="transparent" id="c1"><label
                                    class="form-check-label extra-small" for="c1">Transparent</label></div>
                            <div class="form-check"><input class="form-check-input visible-check" type="radio" name="colorReq" value="opaque" id="c2"><label
                                    class="form-check-label extra-small" for="c2">Opaque</label></div>
                            <div class="form-check"><input class="form-check-input visible-check" type="radio" name="colorReq" value="translucent" id="c3"><label
                                    class="form-check-label extra-small" for="c3">Translucent</label></div>
                            <div class="form-check"><input class="form-check-input visible-check" type="radio" name="colorReq" value="metallic" id="c4"><label
                                    class="form-check-label extra-small" for="c4">Metallic</label></div>
                            <div class="form-check"><input class="form-check-input visible-check" type="radio" name="colorReq" value="fluorescent" id="c5"><label
                                    class="form-check-label extra-small" for="c5">Fluorescent</label></div>
                            <div class="form-check"><input class="form-check-input visible-check" type="radio" name="colorReq" value="pearlescent" id="c6"><label
                                    class="form-check-label extra-small" for="c6">Pearlescent</label></div>
                            <div class="d-flex align-items-center gap-2">
                                <div class="form-check mb-0">
                                    <input class="form-check-input visible-check" type="radio" name="colorReq" value="other" id="c7" >
                                    <label class="form-check-label extra-small" for="c7">Others:</label>
                                </div>
                                <input type="text" class="form-control form-control-sm uniform-input" name="colorReq_other" id="colorReq_other_input" style="width: 150px; height: 26px;">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="col-lg-5">
                <div class="card cmf-entry-card h-100 shadow-sm">
                    <div class="card-body p-3">
                        <h6 class="cmf-section-title mb-3">Process / Technical Specs</h6>
                        
                        <div class="mb-2">
                            <label class="fw-bold extra-small required-label">Resin Type:</label>
                            <select class="form-select form-select-sm ts-select" name="resin" placeholder="Select resin" multiple >
                                <option value=""></option>
                                {% for r in resin %}
                                    <option value="{{ r.resin_no }}">{{ r.abbreviation }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold extra-small d-block mb-1 required-label">Process:</label>
                            <div class="d-flex flex-wrap gap-2">
                                <div class="form-check d-flex align-items-center mb-0">
                                    <input class="form-check-input visible-check" name="process" value="injection" type="checkbox" id="p1">
                                    <label class="form-check-label extra-small ms-2" name="process" for="p1">Injection</label>
                                </div>
                                <div class="form-check d-flex align-items-center mb-0">
                                    <input class="form-check-input visible-check" name="process" value="blow-molding" type="checkbox" id="p2">
                                    <label class="form-check-label extra-small ms-2" name="process" for="p2">Blow-Molding</label>
                                </div>
                                <div class="form-check d-flex align-items-center mb-0">
                                    <input class="form-check-input visible-check" name="process" value="film" type="checkbox" id="p3">
                                    <label class="form-check-label extra-small ms-2" name="process" for="p3">Film</label>
                                </div>
                                <div class="form-check d-flex align-items-center mb-0">
                                    <input class="form-check-input visible-check" name="process" value="pipe-extrusion" type="checkbox" id="p4">
                                    <label class="form-check-label extra-small ms-2" name="process" for="p4">Pipe Extrusion</label>
                                </div>
                                <div class="form-check d-flex align-items-center mb-0">
                                    <input class="form-check-input visible-check" name="process" value="others" type="checkbox" id="p5">
                                    <label class="form-check-label extra-small ms-2 me-1" name="process" for="p5">Others:</label>
                                    <input type="text" class="form-control form-control-sm uniform-input ms-1" name="otherProcess" id="otherProcessInput"  style="width: 120px; height: 26px;">
                                </div>
                            </div>          
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-7"><label class="fw-bold extra-small required-label">Qty Resin for Test:</label><input type="text" name="qty_resin_test" class="form-control form-control-sm uniform-input" ></div>
                            <div class="col-5">
                                <label class="fw-bold extra-small d-block required-label">Customer Resin Provided:</label>
                                <div class="form-check form-check-inline"><input class="form-check-input visible-check" value="Y" type="radio" name="customerResin"
                                        id="resin_yes"><label class="form-check-label extra-small" for="resin_yes">Y</label></div>
                                <div class="form-check form-check-inline"><input class="form-check-input visible-check" value="N" type="radio" name="customerResin"
                                        id="resin_no"><label class="form-check-label extra-small" for="resin_no">N</label></div>
                            </div>
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-7"><label class="fw-bold extra-small required-label">MI Customer Resin:</label><input type="text" name="mi_customer_resin" class="form-control form-control-sm uniform-input" ></div>
                            <div class="col-5">
                                <label class="fw-bold extra-small d-block required-label">Sample Colorant Available:</label>
                                <div class="form-check form-check-inline"><input class="form-check-input visible-check" type="radio" value="Y" name="sampleColorant" id="sample_yes" ><label class="form-check-label extra-small" for="sample_yes">Y</label></div>
                                <div class="form-check form-check-inline"><input class="form-check-input visible-check" type="radio" value="N" name="sampleColorant" id="sample_no" ><label class="form-check-label extra-small" for="sample_no">N</label></div>
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold extra-small d-block mb-1 required-label">Colorant Type:</label>
                            <div class="d-flex align-items-center gap-3">
                                <div class="form-check"><input class="form-check-input visible-check" type="radio" value="MB" name="colorantType" id="colorant_mb" ><label class="form-check-label extra-small" for="colorant_mb">MB</label></div>
                                <div class="form-check"><input class="form-check-input visible-check" type="radio" value="DC" name="colorantType" id="colorant_dc" ><label class="form-check-label extra-small" for="colorant_dc">DC</label></div>
                                <div class="d-flex align-items-center gap-1">
                                    <div class="form-check mb-0">
                                        <input class="form-check-input visible-check" type="radio" value="Other" name="colorantType" id="colorant_type_other">
                                        <label class="form-check-label extra-small" for="colorant_type_other">Others:</label>
                                    </div>
                                    <input type="text" name="colorantTypeOther" id="colorantTypeOtherInput" class="form-control form-control-sm uniform-input" style="width: 100px; height: 26px;">
                                </div>
                            </div>
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label class="fw-bold extra-small required-label">Dosage (%):</label>
                                <input type="text" name="dosage" class="form-control form-control-sm uniform-input dosage-input" placeholder="Enter Dosage" >
                            </div>
                            <div class="col-6">
                                <label class="fw-bold extra-small required-label">Processing Temp (°C):</label>
                                <input type="text" name="processing_temp" class="form-control form-control-sm uniform-input temp-input" value="N/A">
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="fw-bold extra-small d-block mb-1 required-label">Other Specification:</label>
                            <div class="d-flex flex-wrap align-items-center gap-3 row-gap-2">
                                <div class="form-check mb-0">
                                    <input class="form-check-input visible-check" type="checkbox" name="specification" value="Food Contact" id="spec_food_contact">
                                    <label class="form-check-label extra-small" for="spec_food_contact">Food Contact</label>
                                </div>
                                <div class="form-check mb-0">
                                    <input class="form-check-input visible-check" type="checkbox" name="specification" value="Sunlight Exposure" id="spec_sunlight_exposure">
                                    <label class="form-check-label extra-small" for="spec_sunlight_exposure">Sunlight Exposure</label>
                                </div>
                                <div class="d-flex align-items-center gap-1">
                                    <div class="form-check mb-0">
                                        <input class="form-check-input visible-check" type="checkbox" name="specification" value="Others" id="spec_others">
                                        <label class="form-check-label extra-small" for="spec_others">Others</label>
                                    </div>
                                    <input type="text" class="form-control form-control-sm uniform-input" name="specificationOther" id="specificationOtherInput" style="width: 110px; height: 26px;" placeholder="Specify">
                                </div>
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col">
                                <label class="fw-bold extra-small d-block mb-1 required-label">Color Guide to be Returned:</label>
                                <div class="d-flex gap-3 mt-1">
                                    <div class="form-check form-check-inline mb-0">
                                        <input class="form-check-input visible-check" type="radio" name="color_guide_return" value="Y" id="color_guide_yes">
                                        <label class="form-check-label extra-small" for="color_guide_yes">Yes</label>
                                    </div>
                                    <div class="form-check form-check-inline mb-0">
                                        <input class="form-check-input visible-check" type="radio" name="color_guide_return" value="N" id="color_guide_no"  >
                                        <label class="form-check-label extra-small" for="color_guide_no">No</label>
                                    </div>
                                </div>
                            </div>
                            <div class="col">
                                <label class="fw-bold extra-small d-block mb-1 required-label">Is Low Cost?</label>
                                <div class="d-flex gap-3 mt-1">
                                    <div class="form-check form-check-inline mb-0">
                                        <input class="form-check-input visible-check" type="radio" name="is_low_cost" value="Y" id="low_cost_yes">
                                        <label class="form-check-label extra-small" for="low_cost_yes">Yes</label>
                                    </div>
                                    <div class="form-check form-check-inline mb-0">
                                        <input class="form-check-input visible-check" type="radio" name="is_low_cost" value="N" id="low_cost_no">
                                        <label class="form-check-label extra-small" for="low_cost_no">No</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- ADDITIONAL INFO (Below Left) -->
            <div class="col-lg-7">
                <div class="card cmf-entry-card shadow-sm">
                    <div class="card-body p-3">
                        <h6 class="cmf-section-title mb-2">Remarks</h6>
                        <textarea class="form-control form-control-sm uniform-input" name="remarks" rows="3" placeholder="Additional information..."></textarea>
                    </div>
                </div>
            </div>

            <!-- PRODUCT CODE BAR (Below Right) -->
            <div class="col-lg-5">
                <div class="card cmf-entry-card shadow-sm">
                    <div class="card-body p-3">
                         <label class="fw-bold extra-small text-uppercase mb-1">Product Code:</label>
                         <!-- Added custom 'readonly-gray' class -->
                         <input type="text" name="product_code" class="form-control form-control-sm uniform-input readonly-gray fw-bold" readonly>
                    </div>
                </div>
            </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="d-flex justify-content-between align-items-center mt-3 mb-5 px-1">
            <button type="button" class="btn btn-sm btn-teal px-3 shadow-sm" data-bs-toggle="modal" data-bs-target="#uploadModal">
                <i class="bi bi-upload"></i> Upload
            </button>
            <div class="d-flex gap-1">
                <button type="button" class="btn btn-sm btn-dark-teal px-3 text-white shadow-sm btn-print">
                    <i class="bi bi-printer"></i> Print
                </button>
                <button type="button" class="btn btn-sm btn-primary px-3 shadow-sm btn-new">
                    <i class="bi bi-plus-lg"></i> New
                </button>
                <button type="button" class="btn btn-sm btn-success px-3 shadow-sm btn-save">
                    <i class="bi bi-save"></i> Save
                </button>
            </div>
        </div>
    </form>
</div>
{% include "modal/upload-file/dropzone.html" %}
{% endblock %}
