{% extends "base.html" %}
{% load static %}

{% block navigation %} 
Pending/Completed Forms
{% endblock navigation %}

{% block content %}
<div class="container-fluid p-0">
    <form id="updateStatusForm">
        <!-- Main Form Card -->
        <div class="card pc-card shadow-sm border-0 rounded-3">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-4 pc-title">Update CMF Status & Tracking</h5>
                
                <div class="row g-4">
                    <!-- LEFT COLUMN -->
                    <div class="col-lg-6">
                        <div class="mb-3">
                            <label class="fw-bold extra-small">Matching No:</label>
                            <input type="text" name="cmf_no" value="{{ form_data.cmf_no|default:'' }}" class="form-control form-control-sm uniform-input readonly-gray" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">Customer:</label>
                            <input type="text" name="customer" value="{{ form_data.customer|default:'' }}" class="form-control form-control-sm uniform-input readonly-gray" readonly>
                        </div>

                        <!-- Date Created & Required -->
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="fw-bold extra-small">Date Created:</label>
                                <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                    <input type="text" name="date_created" value="{{ form_data.date_created|default:'' }}" class="form-control uniform-input date-picker-single readonly-gray" placeholder="MM/DD/YYYY" data-input readonly>
                                    <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="fw-bold extra-small">Required:</label>
                                <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                    <input type="text" name="required_date" value="{{ form_data.required_date|default:'' }}" class="form-control uniform-input date-picker-single readonly-gray" placeholder="MM/DD/YYYY or ASAP" data-input readonly>
                                    <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>

                        <!-- Date Received & Due Date -->
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="fw-bold extra-small">Date Received:</label>
                                <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                    <input type="text" name="date_received" value="{{ form_data.date_received|default:'' }}" class="form-control uniform-input date-picker-multiple readonly-gray" placeholder="MM/DD/YYYY, MM/DD/YYYY" data-input readonly>
                                    <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="fw-bold extra-small">Due Date:</label>
                                <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                    <input type="text" name="due_date" value="{{ form_data.due_date|default:'' }}" class="form-control uniform-input date-picker-single readonly-gray" placeholder="MM/DD/YYYY" data-input readonly>
                                    <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">Finished Product:</label>
                            <input type="text" name="finished_product" value="{{ form_data.finished_product|default:'' }}" class="form-control form-control-sm uniform-input readonly-gray" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">Color Description:</label>
                            <input type="text" name="color_description" value="{{ form_data.color_description|default:'' }}" class="form-control form-control-sm uniform-input readonly-gray" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">Matching Type:</label>
                            <input type="text" name="matchType" value="{{ form_data.matchType|default:'' }}" class="form-control form-control-sm uniform-input readonly-gray" readonly>
                        </div>

                        <div class="mb-0">
                            <label class="fw-bold extra-small">Sales Person:</label>
                            <input type="text" name="salesman" value="{{ form_data.salesman|default:'' }}" class="form-control form-control-sm uniform-input readonly-gray" readonly>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN -->
                    <div class="col-lg-6">
                        <div class="mb-3">
                            <label class="fw-bold extra-small">Current Status:</label>
                            <select class="form-select form-select-sm uniform-input">
                                <option value="Pending">Pending</option>
                                <option value="Completed">Completed</option>
                                <option value="In Progress">In Progress</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">Pending Reason:</label>
                            <input type="text" class="form-control form-control-sm uniform-input">
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">Product Code:</label>
                            <input type="text" class="form-control form-control-sm uniform-input">
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">Code Description:</label>
                            <input type="text" class="form-control form-control-sm uniform-input">
                        </div>

                        <!-- Set-Pc & Qty Given -->
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="fw-bold extra-small">Set (Pc/Pcs):</label>
                                <input type="text" class="form-control form-control-sm uniform-input" placeholder="Qty">
                            </div>
                            <div class="col-6">
                                <label class="fw-bold extra-small">Qty Given:</label>
                                <input type="text" class="form-control form-control-sm uniform-input" placeholder="KG">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">Date Submitted:</label>
                            <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                <input type="text" name="date_submitted" class="form-control uniform-input date-picker-single" placeholder="MM/DD/YYYY" data-input>
                                <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">Lot No.:</label>
                            <input type="text" class="form-control form-control-sm uniform-input">
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold extra-small">AR No.:</label>
                            <input type="text" class="form-control form-control-sm uniform-input">
                        </div>

                        <div class="mb-0">
                            <label class="fw-bold extra-small">AR Date:</label>
                            <div class="input-group input-group-sm flatpickr-container" data-wrap="true">
                                <input type="text" name="ar_date" class="form-control uniform-input date-picker-single" placeholder="MM/DD/YYYY" data-input>
                                <span class="input-group-text uniform-input border-start-0" data-toggle><i class="bi bi-calendar3"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Update Button -->
        <div class="d-flex justify-content-end mt-4 mb-5">
            <button type="submit" class="btn btn-success px-4 py-2 shadow-sm d-flex align-items-center">
                <i class="bi bi-save me-2"></i> Update Record
            </button>
        </div>
    </form>
</div>
{% endblock %}
