{% extends "base.html" %}
{% load static %}

{% block navigation %} 
Pending/Completed Forms
{% endblock navigation %}

{% block content %}
<div class="container-fluid p-0">
    <form id="updateStatusForm">
        <!-- Main Form Card -->
        <div class="card pc-card shadow-sm border-0 rounded-3">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-4 pc-title">Update CMF Status & Tracking</h5>
                
                <div class="row g-4">
                    <!-- LEFT COLUMN -->
                    <div class="col-lg-6">
                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Matching No:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input readonly-input" value="CMF-24-001" readonly></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Customer:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input readonly-input" value="Sample Customer Name" readonly></div>
                        </div>

                        <!-- Fixed Date Created / Required Row -->
                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Date Created:</label></div>
                            <div class="col-md-4"><input type="date" class="form-control form-control-sm uniform-input"></div>
                            <div class="col-md-1 px-0 text-center"><label class="fw-bold extra-small">Req:</label></div>
                            <div class="col-md-4"><input type="date" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <!-- FIXED Date Received / Due Date Row -->
                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Date Received:</label></div>
                            <div class="col-md-4"><input type="date" class="form-control form-control-sm uniform-input"></div>
                            <div class="col-md-1 px-0 text-center"><label class="fw-bold extra-small">Due:</label></div>
                            <div class="col-md-4"><input type="date" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Finished Product:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Color Description:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Matching Type:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Sales Person:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input"></div>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN -->
                    <div class="col-lg-6">
                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Current Status:</label></div>
                            <div class="col-md-9">
                                <select class="form-select form-select-sm uniform-input">
                                    <option value="Pending">Pending</option>
                                    <option value="Completed">Completed</option>
                                    <option value="In Progress">In Progress</option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small text-nowrap">Pending Reason:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Product Code:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Code Description:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Set-Pc:</label></div>
                            <div class="col-md-3"><input type="text" class="form-control form-control-sm uniform-input" placeholder="Qty"></div>
                            <div class="col-auto px-1"><label class="fw-bold extra-small">Qty Given:</label></div>
                            <div class="col-md-3 flex-grow-1"><input type="text" class="form-control form-control-sm uniform-input" placeholder="KG"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Date Submitted:</label></div>
                            <div class="col-md-9"><input type="date" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">Lot No.:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">AR No.:</label></div>
                            <div class="col-md-9"><input type="text" class="form-control form-control-sm uniform-input"></div>
                        </div>

                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-3"><label class="fw-bold extra-small">AR Date:</label></div>
                            <div class="col-md-9"><input type="date" class="form-control form-control-sm uniform-input"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Update Button -->
        <div class="d-flex justify-content-end mt-4 mb-5">
            <button type="submit" class="btn btn-success px-4 py-2 shadow-sm d-flex align-items-center">
                <i class="bi bi-save me-2"></i> Update Record
            </button>
        </div>
    </form>
</div>
{% endblock %}
